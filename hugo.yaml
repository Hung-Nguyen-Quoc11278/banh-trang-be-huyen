          url: "https://example.com"

  about:
    enable: true
    title: "Về Huyền"
    image: "/images/banhtrangbehuyen.webp"
    content: |-
      Là một người con của Tây Ninh, hiện đang sống tại Tây Ninh, từ thuở bé Huyền đã rất thích ăn vặt, đặc biệt là đặc sản ở tại quê nhà.
      Chưa dừng lại ở sở thích cá nhân là "ăn" Huyền quyết định kinh doanh những món thật tâm đắc, để mang hương vị này đến khắp mọi người
      có cùng đam mê, sở thích. Với Huyền công việc này không chỉ tạo nên thu nhập, niềm vui, mà còn là góp phần tạo nên 1 bản sắc năng động
      cho chính vùng quê mà mình được sinh ra và lớn lên.

  contact:
    enable: true
    content: Liên hệ qua số điện thoại
    btnName: Gọi ngay
    btnLink: 1900 1558

  footer:
    recentPosts:
      path: "blogs"
      count: 3
      title: Món Nè Lựa Nha
      enable: true
      disableFeaturedImage: false
    socialNetworks:
      
      facebook: https://facebook.com

  listPages:
